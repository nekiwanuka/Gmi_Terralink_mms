{% extends "base.html" %}
{% load i18n %}
{% block title %}{% trans "Stock Transfer" %}{% endblock %}
{% block content %}
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
  <h2>{% trans "Stock Transfer" %}</h2>
  <div style="display:flex;gap:.5rem">
    <a href="/inventory/" class="btn btn-secondary btn-sm">{% trans "Stock Items" %}</a>
    <a href="/inventory/locations/" class="btn btn-secondary btn-sm">{% trans "Locations" %}</a>
    <a href="/inventory/movements/" class="btn btn-secondary btn-sm">{% trans "Movements" %}</a>
  </div>
</div>

<div class="form-panel">
<form method="post">
  {% csrf_token %}
  <div class="form-row">
    <div class="form-group">
      <label>{% trans "Item" %}</label>
      <select name="item" required>
        <option value="">— {% trans "Select item" %} —</option>
        {% for it in items %}<option value="{{ it.pk }}">{{ it.sku }} — {{ it.name }} ({% trans "on hand" %}: {{ it.stock_on_hand }})</option>{% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>{% trans "Quantity" %}</label>
      <input type="number" name="quantity" min="1" required />
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>{% trans "From (source)" %}</label>
      <select name="source" required>
        <option value="">— {% trans "Source location" %} —</option>
        {% for loc in locations %}<option value="{{ loc.pk }}">{{ loc.code }} ({{ loc.kind }})</option>{% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>{% trans "To (destination)" %}</label>
      <select name="destination" required>
        <option value="">— {% trans "Destination location" %} —</option>
        {% for loc in locations %}<option value="{{ loc.pk }}">{{ loc.code }} ({{ loc.kind }})</option>{% endfor %}
      </select>
    </div>
  </div>
  <div class="form-group">
    <label>{% trans "Note" %}</label>
    <input name="note" placeholder="{% trans 'Reason / reference' %}" />
  </div>
  <button class="btn btn-primary" type="submit">{% trans "Record Transfer" %}</button>
</form>
</div>
{% endblock %}
